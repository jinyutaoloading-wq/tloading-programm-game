<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>互动短剧游戏平台 Demo</title>
  <link rel="stylesheet" href="./shared/base.css">
  <link rel="stylesheet" href="./shared/runtime-assets.css">
  <style>
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 12% 0, rgba(15, 143, 145, .2), transparent 32%),
        radial-gradient(circle at 88% 12%, rgba(241, 95, 91, .14), transparent 28%),
        #f6f8f8;
    }

    .portal {
      width: min(960px, 100%);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      align-items: stretch;
    }

    .portal-head {
      grid-column: 1 / -1;
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 8px;
    }

    .portal-head h1 {
      margin-bottom: 6px;
      font-size: clamp(30px, 5vw, 52px);
      letter-spacing: 0;
    }

    .portal-head p {
      margin-bottom: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .entry-card {
      min-height: 360px;
      display: grid;
      align-content: end;
      gap: 12px;
      position: relative;
      isolation: isolate;
      overflow: hidden;
      border-radius: 8px;
      padding: 22px;
      color: #fff;
      box-shadow: var(--shadow);
    }

    .entry-card::before,
    .entry-card::after {
      position: absolute;
      inset: 0;
      content: "";
      z-index: -2;
      background-image: var(--asset-poster);
      background-size: cover;
      background-position: center;
    }

    .entry-card.admin::before {
      background-image: var(--asset-admin-canvas);
    }

    .entry-card::after {
      z-index: -1;
      background: linear-gradient(180deg, transparent, rgba(7, 16, 20, .82));
    }

    .entry-card.admin {
      color: var(--ink);
      background: #fff;
    }

    .entry-card.admin::after {
      background: linear-gradient(180deg, rgba(255, 255, 255, .24), rgba(255, 255, 255, .94));
    }

    .entry-card h2 {
      margin-bottom: 0;
      font-size: 28px;
    }

    .entry-card p {
      max-width: 320px;
      margin-bottom: 4px;
      color: currentColor;
      opacity: .76;
      line-height: 1.65;
    }

    .entry-card a {
      width: max-content;
      display: inline-grid;
      place-items: center;
      min-height: 44px;
      border-radius: 8px;
      padding: 0 18px;
      background: #fff;
      color: var(--ink);
      font-weight: 900;
    }

    .entry-card.admin a {
      background: var(--dark);
      color: #fff;
    }

    @media (max-width: 780px) {
      .portal,
      .portal-head {
        grid-template-columns: 1fr;
        display: grid;
      }
    }
  </style>
</head>
<body>
  <main class="portal">
    <header class="portal-head">
      <div>
        <span class="eyebrow">Interactive Drama MVP</span>
        <h1>互动短剧游戏平台</h1>
        <p>用户端与配置后台已拆分为两个独立入口，打开链接后直接进入对应功能。</p>
      </div>
    </header>
    <section class="entry-card">
      <span class="eyebrow">用户端</span>
      <h2>互动短剧小程序</h2>
      <p>进入后直接播放、选择、解锁、查看剧情图和结局。</p>
      <a href="./user/">打开用户端</a>
    </section>
    <section class="entry-card admin">
      <span class="eyebrow">后台端</span>
      <h2>配置管理后台</h2>
      <p>进入后直接配置剧目、节点、素材、付费规则、审核发布和数据。</p>
      <a href="./admin/">打开后台</a>
    </section>
  </main>
</body>
</html>
